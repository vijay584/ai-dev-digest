<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: oklch(0.13 0.01 240);
      --foreground: oklch(0.95 0 0);
      --primary: oklch(0.65 0.15 175);
      --muted-foreground: oklch(0.65 0.02 240);
      --border: oklch(0.28 0.01 240);
      --secondary: oklch(0.22 0.01 240);
      --radius: 8px;
      --radius-sm: 4px;
      --font-body: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Sticky header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: oklch(0.13 0.01 240 / 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .site-header-inner {
      max-width: 768px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 18px;
      height: 18px;
      color: var(--background);
    }

    .site-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--foreground);
      line-height: 1.2;
    }

    .site-subtitle {
      font-size: 12px;
      color: var(--muted-foreground);
      line-height: 1.2;
    }

    .badge {
      font-size: 12px;
      color: var(--muted-foreground);
      background: var(--secondary);
      padding: 4px 8px;
      border-radius: 9999px;
      white-space: nowrap;
    }

    /* Main content */
    .main {
      max-width: 768px;
      margin: 0 auto;
      padding: 48px 16px 64px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .page-subtitle {
      font-size: 16px;
      color: var(--muted-foreground);
      margin-bottom: 48px;
    }

    /* Article / digest entry */
    .digest-entry {
      padding-bottom: 32px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .digest-entry:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .entry-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--foreground);
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .entry-summary {
      font-size: 16px;
      color: var(--muted-foreground);
      line-height: 1.625;
      margin-bottom: 24px;
    }

    /* Sources + Glossary layout */
    .entry-meta {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sources-section {
      flex: 1;
      min-width: 0;
    }

    .glossary-section {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label svg {
      width: 14px;
      height: 14px;
    }

    /* Sources list */
    .sources-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .source-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-decoration: none;
    }

    .source-dot {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .source-dot svg {
      width: 16px;
      height: 16px;
      color: var(--muted-foreground);
      transition: color 0.15s;
    }

    .source-item:hover .source-dot svg {
      color: var(--primary);
    }

    .source-subreddit {
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
      margin-right: 8px;
      white-space: nowrap;
    }

    .source-title {
      font-size: 14px;
      color: var(--muted-foreground);
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .source-item:hover .source-title {
      opacity: 1;
    }

    /* Glossary list */
    .glossary-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .glossary-term {
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
    }

    .glossary-def {
      font-size: 14px;
      color: var(--muted-foreground);
      margin-top: 2px;
      line-height: 1.625;
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px 16px;
    }

    .site-footer-inner {
      max-width: 768px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--muted-foreground);
    }

    /* Desktop (md+) */
    @media (min-width: 768px) {
      .entry-title {
        font-size: 30px;
      }

      .entry-summary {
        font-size: 18px;
      }

      .entry-meta {
        flex-direction: row;
        gap: 40px;
      }

      .glossary-section {
        width: 288px;
        border-top: none;
        padding-top: 0;
        border-left: 1px solid var(--border);
        padding-left: 40px;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <div class="site-header-left">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/>
          </svg>
        </div>
        <div>
          <div class="site-title">Tech Digest</div>
          <div class="site-subtitle">Curated from Reddit</div>
        </div>
      </div>
      <span class="badge">Personal</span>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">Latest Digest</h1>
    <p class="page-subtitle">AI-summarized discussions from tech communities</p>
    <div id="digest"></div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <span>Auto-generated digest from Reddit discussions</span>
      <span>Powered by workflow automation</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
