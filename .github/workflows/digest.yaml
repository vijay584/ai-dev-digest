name: Generate AI Digest

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run digest generator
        run: node src/index.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit updated digest
        run: |
          git config --global user.name "digest-bot"
          git config --global user.email "bot@github.com"
          git add digest.json cache.json
          git commit -m "update digest" || echo "no changes"
          git push
