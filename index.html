<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ 
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#5eb3b3',
        primaryTextColor: '#f5f5f5',
        primaryBorderColor: '#5eb3b3',
        lineColor: '#888',
        secondaryColor: '#2a2a2a',
        tertiaryColor: '#1a1a1a',
        background: '#1a1a1a',
        mainBkg: '#2a2a2a',
        secondBkg: '#1a1a1a'
      }
    });
    window.mermaid = mermaid;
  </script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: oklch(0.13 0.01 240);
      --foreground: oklch(0.95 0 0);
      --primary: oklch(0.65 0.15 175);
      --muted-foreground: oklch(0.65 0.02 240);
      --border: oklch(0.28 0.01 240);
      --secondary: oklch(0.22 0.01 240);
      --radius: 8px;
      --radius-sm: 4px;
      --font-body: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Sticky header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: oklch(0.13 0.01 240 / 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .site-header-inner {
      max-width: 1024px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 18px;
      height: 18px;
      color: var(--background);
    }

    .site-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--foreground);
      line-height: 1.2;
    }

    .site-subtitle {
      font-size: 12px;
      color: var(--muted-foreground);
      line-height: 1.2;
    }

    .badge {
      font-size: 12px;
      color: var(--muted-foreground);
      background: var(--secondary);
      padding: 4px 8px;
      border-radius: 9999px;
      white-space: nowrap;
    }

    /* Main content */
    .main {
      max-width: 1024px;
      margin: 0 auto;
      padding: 48px 16px 64px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .page-subtitle {
      font-size: 16px;
      color: var(--muted-foreground);
      margin-bottom: 48px;
    }

    /* Article / digest entry */
    .digest-entry {
      padding-bottom: 32px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .digest-entry:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .entry-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--foreground);
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .entry-summary {
      font-size: 16px;
      color: var(--muted-foreground);
      line-height: 1.625;
      margin-bottom: 24px;
    }

    /* Sources + Glossary layout */
    .entry-meta {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sources-section {
      flex: 1;
      min-width: 0;
    }

    .glossary-section {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label svg {
      width: 14px;
      height: 14px;
    }

    /* Sources list */
    .sources-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .source-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-decoration: none;
    }

    .source-dot {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .source-dot svg {
      width: 16px;
      height: 16px;
      color: var(--muted-foreground);
      transition: color 0.15s;
    }

    .source-item:hover .source-dot svg {
      color: var(--primary);
    }

    .source-subreddit {
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
      margin-right: 8px;
      white-space: nowrap;
    }

    .source-title {
      font-size: 14px;
      color: var(--muted-foreground);
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .source-item:hover .source-title {
      opacity: 1;
    }

    /* Glossary list */
    .glossary-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .glossary-term {
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
    }

    .glossary-def {
      font-size: 14px;
      color: var(--muted-foreground);
      margin-top: 2px;
      line-height: 1.625;
    }

    /* Case Studies Section */
    .case-studies-section {
      margin-top: 64px;
      padding-top: 48px;
      border-top: 2px solid var(--border);
    }

    .section-heading {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .section-description {
      font-size: 16px;
      color: var(--muted-foreground);
      margin-bottom: 32px;
    }

    .case-study-card {
      background: var(--secondary);
      padding: 32px;
      border-radius: var(--radius);
      margin-bottom: 24px;
    }

    .case-study-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .company-badge {
      display: inline-block;
      background: var(--primary);
      color: var(--background);
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .case-study-content {
      font-size: 16px;
      line-height: 1.7;
      color: var(--foreground);
      margin: 24px 0;
    }

    .case-study-content h2 {
      font-size: 22px;
      font-weight: 600;
      margin-top: 32px;
      margin-bottom: 16px;
      color: var(--foreground);
    }

    .case-study-content h3 {
      font-size: 18px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 12px;
      color: var(--foreground);
    }

    .case-study-content p {
      margin-bottom: 16px;
    }

    .case-study-content ul,
    .case-study-content ol {
      margin: 16px 0;
      padding-left: 24px;
      color: var(--muted-foreground);
    }

    .case-study-content li {
      margin-bottom: 8px;
    }

    .case-study-content strong {
      color: var(--foreground);
      font-weight: 600;
    }

    .case-study-content em {
      color: var(--primary);
      font-style: italic;
    }

    .case-study-content code {
      background: var(--background);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'Monaco', 'Courier New', monospace;
      color: var(--primary);
    }

    .case-study-content pre {
      background: var(--background);
      padding: 16px;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 24px 0;
      border: 1px solid var(--border);
    }

    .case-study-content pre code {
      background: none;
      padding: 0;
      color: var(--foreground);
    }

    .case-study-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 14px;
    }

    .case-study-content th {
      background: var(--background);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--foreground);
    }

    .case-study-content td {
      padding: 12px;
      border: 1px solid var(--border);
      color: var(--muted-foreground);
    }

    .case-study-content tr:hover {
      background: var(--background);
    }

    .case-study-content blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 16px;
      margin: 24px 0;
      color: var(--muted-foreground);
      font-style: italic;
    }

    .case-study-content .mermaid {
      background: var(--background);
      padding: 24px;
      border-radius: var(--radius);
      margin: 24px 0;
      display: flex;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .key-takeaways,
    .further-reading {
      margin-top: 24px;
    }

    .key-takeaways h3,
    .further-reading h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--foreground);
    }

    .key-takeaways ul,
    .further-reading ul {
      list-style: none;
      padding-left: 0;
    }

    .key-takeaways li {
      padding-left: 24px;
      position: relative;
      margin-bottom: 8px;
      color: var(--muted-foreground);
      line-height: 1.6;
    }

    .key-takeaways li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--primary);
      font-weight: 700;
    }

    .further-reading ul {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .further-reading a {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      transition: opacity 0.15s;
    }

    .further-reading a:hover {
      opacity: 0.7;
    }

    .related-topics {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .related-topic-tag {
      background: var(--background);
      color: var(--muted-foreground);
      padding: 6px 12px;
      border-radius: 9999px;
      font-size: 13px;
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px 16px;
    }

    .site-footer-inner {
      max-width: 1024px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--muted-foreground);
    }

    /* Desktop (md+) */
    @media (min-width: 768px) {
      .entry-title {
        font-size: 30px;
      }

      .entry-summary {
        font-size: 18px;
      }

      .entry-meta {
        flex-direction: row;
        gap: 40px;
      }

      .glossary-section {
        width: 288px;
        border-top: none;
        padding-top: 0;
        border-left: 1px solid var(--border);
        padding-left: 40px;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <div class="site-header-left">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/>
          </svg>
        </div>
        <div>
          <div class="site-title">Tech Digest</div>
          <div class="site-subtitle">Curated from Reddit</div>
        </div>
      </div>
      <span class="badge">Personal</span>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">Latest Digest</h1>
    <p class="page-subtitle">AI-summarized discussions from tech communities</p>
    <div id="digest"></div>

    <div class="case-studies-section">
      <h2 class="section-heading">Today's Learning</h2>
      <p class="section-description">Deep dives into real-world engineering and system design</p>
      <div id="case-studies"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <span>Auto-generated digest from Reddit discussions</span>
      <span>Powered by workflow automation</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
